name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run backend type checks
        run: python -m mypy src tests

      - name: Apply database migrations
        env:
          RFI_DATABASE_URL: sqlite+pysqlite:///./data/ci.db
        run: rfi-manage migrate

      - name: Run backend tests
        run: python -m pytest -q

  platform-smoke:
    runs-on: ubuntu-latest
    needs: backend-quality
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rfi
          POSTGRES_USER: rfi
          POSTGRES_PASSWORD: rfi-dev-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfi -d rfi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Smoke-test production wiring
        env:
          RFI_APP_ENV: ci
          RFI_DATABASE_URL: postgresql+psycopg://rfi:rfi-dev-password@127.0.0.1:5432/rfi
          RFI_DATABASE_AUTO_CREATE_SCHEMA: "false"
          RFI_SEED_SCENARIOS_ON_STARTUP: "true"
          RFI_JWT_SECRET: ci-jwt-secret-key-for-production-smoke-0001
          RFI_BOOTSTRAP_ADMIN_USERNAME: admin
          RFI_BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!
          RFI_BOOTSTRAP_ANALYST_USERNAME: analyst
          RFI_BOOTSTRAP_ANALYST_PASSWORD: AnalystPassword123!
          RFI_RATE_LIMIT_BACKEND: redis
          RFI_RATE_LIMIT_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          rfi-manage migrate
          python - <<'PY'
          from fastapi.testclient import TestClient
          from relational_fraud_intelligence.app import create_app

          with TestClient(create_app()) as client:
              health = client.get("/api/v1/health")
              assert health.status_code == 200, health.text
              payload = health.json()
              assert payload["database_status"] == "ready", payload
              assert payload["rate_limit_status"] == "ready", payload
              auth = client.post(
                  "/api/v1/auth/token",
                  json={"username": "admin", "password": "AdminPassword123!"},
              )
              assert auth.status_code == 200, auth.text
          PY

  backend-integration:
    runs-on: ubuntu-latest
    needs: backend-quality
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rfi_integration
          POSTGRES_USER: rfi
          POSTGRES_PASSWORD: rfi-ci-password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U rfi -d rfi_integration"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Postgres integration tests
        env:
          RFI_DATABASE_URL: postgresql+psycopg://rfi:rfi-ci-password@127.0.0.1:5433/rfi_integration
          RFI_JWT_SECRET: ci-test-secret-key-for-integration-tests-0001
          RFI_BOOTSTRAP_ADMIN_USERNAME: admin
          RFI_BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!
          RFI_BOOTSTRAP_ANALYST_USERNAME: analyst
          RFI_BOOTSTRAP_ANALYST_PASSWORD: AnalystPassword123!
        run: python -m pytest -m postgres -q

  openapi-check:
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py

      - name: Check for schema drift
        run: git diff --exit-code docs/openapi.json

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend (for OpenAPI export)
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Generate TypeScript contracts from OpenAPI
        run: |
          python scripts/export_openapi.py
          npm --prefix frontend run codegen:contracts

      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck

      - name: Test frontend
        run: npm --prefix frontend run test:run

      - name: Build frontend
        env:
          API_BASE_URL: http://localhost:8001/api/v1
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api/v1
        run: npm --prefix frontend run build

  # ── Playwright E2E (on-demand) ───────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    needs: [backend-quality, frontend-quality]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rfi_e2e
          POSTGRES_USER: rfi
          POSTGRES_PASSWORD: rfi-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfi -d rfi_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        run: python -m pip install -e ".[dev]"

      - name: Install frontend
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Generate contracts
        run: |
          python scripts/export_openapi.py
          npm --prefix frontend run codegen:contracts

      - name: Start backend
        env:
          RFI_APP_ENV: ci
          RFI_DATABASE_URL: postgresql+psycopg://rfi:rfi-ci-password@127.0.0.1:5432/rfi_e2e
          RFI_JWT_SECRET: ci-e2e-jwt-secret-key-0001
          RFI_BOOTSTRAP_ADMIN_USERNAME: admin
          RFI_BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!
          RFI_BOOTSTRAP_ANALYST_USERNAME: analyst
          RFI_BOOTSTRAP_ANALYST_PASSWORD: AnalystPassword123!
          RFI_RATE_LIMIT_BACKEND: redis
          RFI_RATE_LIMIT_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          rfi-manage migrate
          python -m relational_fraud_intelligence &
          for i in $(seq 1 30); do curl -sf http://localhost:8001/api/v1/health && break || sleep 1; done

      - name: Run Playwright E2E
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api/v1
        run: npm --prefix frontend run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Security audit ────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        run: python -m pip install -e ".[dev]"

      - name: pip-audit (Python dependency vulnerabilities)
        run: |
          pip install pip-audit
          pip-audit --strict --desc

      - name: npm audit (frontend dependency vulnerabilities)
        run: npm --prefix frontend audit --audit-level=high || true

  # ── Load test (on-demand) ────────────────────────────────────────────
  load-test:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'run-loadtest')
    needs: [backend-quality]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rfi_load
          POSTGRES_USER: rfi
          POSTGRES_PASSWORD: rfi-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfi -d rfi_load"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend + locust
        run: python -m pip install -e ".[dev,loadtest]"

      - name: Start backend
        env:
          RFI_DATABASE_URL: postgresql+psycopg://rfi:rfi-ci-password@127.0.0.1:5432/rfi_load
          RFI_JWT_SECRET: ci-load-jwt-secret-key-0001
          RFI_BOOTSTRAP_ANALYST_USERNAME: analyst
          RFI_BOOTSTRAP_ANALYST_PASSWORD: AnalystPassword123!
        run: |
          rfi-manage migrate
          python -m relational_fraud_intelligence &
          for i in $(seq 1 30); do curl -sf http://localhost:8001/api/v1/health && break || sleep 1; done

      - name: Run Locust headless
        run: |
          locust -f tests/loadtest/locustfile.py --headless \
            -u 20 -r 5 --run-time 30s \
            --host http://localhost:8001 \
            --csv=loadtest-results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loadtest-results
          path: loadtest-results*.csv
          retention-days: 14

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-integration, platform-smoke, openapi-check, frontend-quality, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile .

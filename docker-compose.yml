services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://backend:8000/api/v1}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rfi
      POSTGRES_USER: rfi
      POSTGRES_PASSWORD: rfi-dev-password
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfi -d rfi"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      RFI_API_PORT: "8001"
      RFI_DATABASE_URL: ${RFI_DATABASE_URL:-postgresql+psycopg://rfi:rfi-dev-password@postgres:5432/rfi}
      RFI_BOOTSTRAP_ADMIN_USERNAME: ${RFI_BOOTSTRAP_ADMIN_USERNAME:-admin}
      RFI_BOOTSTRAP_ADMIN_PASSWORD: ${RFI_BOOTSTRAP_ADMIN_PASSWORD:-AdminPassword123!}
      RFI_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${RFI_BOOTSTRAP_ADMIN_DISPLAY_NAME:-Platform Admin}
      RFI_BOOTSTRAP_ANALYST_USERNAME: ${RFI_BOOTSTRAP_ANALYST_USERNAME:-analyst}
      RFI_BOOTSTRAP_ANALYST_PASSWORD: ${RFI_BOOTSTRAP_ANALYST_PASSWORD:-AnalystPassword123!}
      RFI_BOOTSTRAP_ANALYST_DISPLAY_NAME: ${RFI_BOOTSTRAP_ANALYST_DISPLAY_NAME:-Fraud Analyst}
      RFI_RATE_LIMIT_BACKEND: ${RFI_RATE_LIMIT_BACKEND:-redis}
      RFI_RATE_LIMIT_REDIS_URL: ${RFI_RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${RFI_API_HOST_PORT:-8001}:8001"
    volumes:
      - rfi_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_BASE_URL: http://backend:8001/api/v1
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${RFI_API_HOST_PORT:-8001}/api/v1
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${RFI_FRONTEND_HOST_PORT:-3001}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rfi_data:
